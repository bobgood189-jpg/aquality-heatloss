<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>404 — Aquality · WaterPro</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='5' fill='%230a0705'/><path d='M16 5 L8 22 L24 22 Z' stroke='%23f59e0b' stroke-width='1.8' fill='none' stroke-linejoin='round'/><line x1='10.5' y1='17' x2='21.5' y2='17' stroke='%23f59e0b' stroke-width='1.8'/><circle cx='16' cy='22' r='2.5' fill='%23f59e0b'/></svg>" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:#07090F;color:#ECF0FA;font-family:'Manrope',system-ui,sans-serif;
    min-height:100dvh;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:1.5rem;overflow:hidden;position:relative;
  }
  .orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;opacity:.14}
  .orb1{width:24rem;height:24rem;top:12%;right:14%;background:radial-gradient(#1D4ED8,transparent 70%)}
  .orb2{width:20rem;height:20rem;bottom:16%;left:14%;background:radial-gradient(#f59e0b,transparent 70%)}
  .wrap{position:relative;z-index:1;max-width:32rem;animation:rise .6s cubic-bezier(.22,1,.36,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.wrap{animation:none}}
  .flame{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,rgba(245,158,11,.18),rgba(249,115,22,.07));
    border:1px solid rgba(245,158,11,.25);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1.5rem}
  .code{font-size:clamp(4.5rem,18vw,7rem);font-weight:800;line-height:1;letter-spacing:-.03em;
    background:linear-gradient(135deg,#f59e0b,#F97316);-webkit-background-clip:text;background-clip:text;color:transparent}
  h1{font-size:1.35rem;font-weight:700;margin:.75rem 0 .5rem;color:#ECF0FA}
  p{font-size:.95rem;line-height:1.6;color:#8FA3C0;margin-bottom:1.75rem}
  .btn{display:inline-flex;align-items:center;gap:.5rem;background:linear-gradient(135deg,#f59e0b,#d97706);color:#0B0F1A;
    font-weight:700;font-size:.9rem;text-decoration:none;padding:.8rem 1.6rem;border-radius:100px;
    box-shadow:0 8px 30px -8px rgba(245,158,11,.5);transition:transform .15s ease,box-shadow .15s ease}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px -8px rgba(245,158,11,.6)}
  .btn:active{transform:translateY(0)}
  .brand{margin-top:2rem;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(143,163,192,.4)}
</style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="wrap">
    <div class="flame">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.6">
        <path d="M12 2C8 6 6 8.5 6 12a6 6 0 0012 0c0-3.5-2-6-6-10z" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 15v-4" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="code">404</div>
    <h1>Страница не найдена</h1>
    <p>Похоже, такой страницы нет или она была перемещена.<br>Вернитесь на главную — расчёт теплопотерь ждёт вас.</p>
    <a href="/" class="btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      На главную
    </a>
    <div class="brand">Aquality · WaterPro · Фергана</div>
  </div>
</body>
</html>
