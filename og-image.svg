<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="60%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2a1c08"/>
      <stop offset="100%" stop-color="#0a0705"/>
    </radialGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1610" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#12100b" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <ellipse cx="800" cy="200" rx="320" ry="280" fill="url(#orb1)"/>
  <ellipse cx="300" cy="450" rx="260" ry="220" fill="url(#orb2)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#d9c7b4" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Brand name -->
  <text x="80" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="800" fill="#faf6f0" letter-spacing="-0.5">Aquality</text>
  <text x="268" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="700" fill="#f59e0b"> | </text>
  <text x="308" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="800" fill="#faf6f0">WaterPro</text>
  <text x="80" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#9a8675" letter-spacing="0.12em">ОТОПЛЕНИЕ · САНТЕХНИКА · ФЕРГАНА</text>

  <!-- Main headline -->
  <text x="80" y="222" font-family="system-ui,-apple-system,sans-serif" font-size="58" font-weight="800" fill="#faf6f0" letter-spacing="-1.5">Расчёт теплопотерь</text>
  <text x="80" y="295" font-family="system-ui,-apple-system,sans-serif" font-size="58" font-weight="800" fill="url(#title-grad)" letter-spacing="-1.5">всего здания</text>
  <text x="80" y="356" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="400" fill="#9a8675">Нарисуйте план → получите котёл + радиаторы по каждой комнате</text>

  <!-- Stats cards -->
  <!-- Card 1: Engineering calc -->
  <rect x="80" y="410" width="240" height="116" rx="16" fill="url(#card-grad)" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="1"/>
  <text x="104" y="445" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#f59e0b" letter-spacing="0.08em">КАЛЬКУЛЯТОР</text>
  <text x="104" y="482" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="800" fill="#faf6f0">КМК</text>
  <text x="104" y="510" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#9a8675">инженерный расчёт</text>

  <!-- Card 2: Boiler -->
  <rect x="344" y="410" width="240" height="116" rx="16" fill="url(#card-grad)" stroke="#d9c7b4" stroke-opacity="0.12" stroke-width="1"/>
  <text x="368" y="445" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#f59e0b" letter-spacing="0.08em">КОТЁЛ</text>
  <text x="368" y="482" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="800" fill="#faf6f0">+25%</text>
  <text x="368" y="510" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#9a8675">запас мощности</text>

  <!-- Card 3: Radiators -->
  <rect x="608" y="410" width="240" height="116" rx="16" fill="url(#card-grad)" stroke="#d9c7b4" stroke-opacity="0.12" stroke-width="1"/>
  <text x="632" y="445" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#f59e0b" letter-spacing="0.08em">РАДИАТОРЫ</text>
  <text x="632" y="482" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="800" fill="#faf6f0">по комнатам</text>
  <text x="632" y="510" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#9a8675">секции для каждой</text>

  <!-- Right decorative element: house icon -->
  <g transform="translate(930, 200)">
    <!-- House outline glow -->
    <circle cx="90" cy="110" r="120" fill="#f59e0b" fill-opacity="0.06"/>
    <!-- House -->
    <polygon points="90,10 20,65 160,65" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-opacity="0.7" stroke-linejoin="round"/>
    <rect x="30" y="65" width="120" height="90" rx="4" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-opacity="0.7"/>
    <!-- Door -->
    <rect x="70" y="110" width="38" height="45" rx="3" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Windows -->
    <rect x="38" y="82" width="28" height="22" rx="2" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="114" y="82" width="28" height="22" rx="2" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Flame/heat symbol -->
    <text x="80" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#9a8675" text-anchor="middle" letter-spacing="0.05em">∼ 14°C зимой</text>
  </g>

  <!-- Free badge -->
  <rect x="80" y="548" width="110" height="32" rx="16" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="135" y="570" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="0.04em">БЕСПЛАТНО</text>

  <!-- URL -->
  <text x="80" y="610" font-family="ui-monospace,monospace" font-size="13" fill="#9a8675">aqualityheatloss.netlify.app</text>
</svg>
